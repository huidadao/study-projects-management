services:
  - type: web
    name: study-projects-management-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /data/data.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
